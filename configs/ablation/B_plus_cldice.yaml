# =====================================================================
# Ablation B — "+Topology (clDice)":  Dice + BCE + clDice   (3 terms)
#
# Δ vs A: add the bidirectional centerline-Dice loss (Shit et al., CVPR 2021)
# Tests the contribution of *topology-aware bidirectional* supervision.
# =====================================================================

experiment:
  name: ablation_B_plus_cldice
  seed: 42
  output_dir: outputs/ablation/B_plus_cldice

data:
  root: ./data
  train_manifest: manifests/CRACK500.json
  val_manifest:   manifests/CRACK500.json
  pseudo_cache:   outputs/pseudo/CRACK500
  image_size: 512
  num_workers: 6
  min_pseudo_ratio: 0.0005
  max_pseudo_ratio: 0.35

crossdomain:
  - {name: DeepCrack, manifest: manifests/DeepCrack.json, split: test}
  - {name: CFD,       manifest: manifests/CFD.json,       split: test}

teacher:
  name: sam3
  ckpt: ./checkpoints/sam3/sam3.pt
  load_from_HF: false
  bpe_path: null
  resolution: 1008
  confidence_threshold: 0.15
  binary_threshold:     0.2
  score_weight:         false
  max_mask_area_ratio: 0.30
  min_mask_area_px:    16
  text_prompts: ["crack"]
  ensemble_prompts: ["crack", "a crack", "road crack", "pavement crack"]
  enable_hflip_tta: false
  autocast_dtype: bfloat16
  mc_samples: 1
  device: cuda

student:
  name: scsegamba_lite
  in_channels: 3
  base_channels: 32
  num_classes: 1
  edge_branch: true

gate:
  alpha: 1.0
  beta:  1.0
  gamma: 1.0
  sigma_s: 5.0
  tau: 0.5

# ★ Ablation B: A + clDice
loss:
  w_dice:         1.0
  w_bce:          1.0
  w_skelrecall:   0.0       # — off (added in C)
  w_cldice:       0.5       # ★ added: bidirectional centerline-Dice
  w_dt:           0.0       # — off (added in D)
  w_edge:         0.0       # — off (added in D)
  w_consistency:  0.0       # — off (added in E)

train:
  epochs:         40
  batch_size:     4
  grad_accum_steps: 2
  optimizer:      adamw
  lr:             2.0e-4
  weight_decay:   1.0e-4
  scheduler:      cosine
  warmup_epochs:  3
  ema_decay:      0.999
  amp:            true
  log_every:      50
  ckpt_every:     10
  resume:         null
