
# =====================================================================
# Ablation E — "Minimal Effective Recipe":  Dice + BCE + EMA Consistency
#                                                        (3 loss terms)
#
# Hypothesis (the paper's most ambitious bet):
#   The EMA-teacher consistency loss alone (over the *unreliable* region
#   produced by our Confidence Gate) is enough to lift cross-domain CFD
#   from 0.56 (config A) to 0.65+ — without ANY topology loss.
#
# If confirmed, this rewrites the paper narrative from "7-loss recipe"
# to "Less is more: Confidence Gate + EMA-teacher consistency suffice".
#
# Δ vs A (Dice + BCE):
#   + w_consistency = 0.1   (the EMA teacher on unreliable pixels,
#                            implemented in engine/trainer.py)
# =====================================================================

experiment:
  name: ablation_E_min_consistency
  seed: 42
  output_dir: outputs/ablation/E_min_consistency

data:
  root: ./data
  train_manifest: manifests/CRACK500.json
  val_manifest:   manifests/CRACK500.json
  pseudo_cache:   outputs/pseudo/CRACK500
  image_size: 512
  num_workers: 6
  min_pseudo_ratio: 0.0005
  max_pseudo_ratio: 0.35

crossdomain:
  - {name: DeepCrack, manifest: manifests/DeepCrack.json, split: test}
  - {name: CFD,       manifest: manifests/CFD.json,       split: test}
  - {name: GAPs384,   manifest: manifests/GAPs384.json,   split: test}

teacher:
  name: sam3
  ckpt: ./checkpoints/sam3/sam3.pt
  load_from_HF: false
  bpe_path: null
  resolution: 1008
  confidence_threshold: 0.15
  binary_threshold:     0.2
  score_weight:         false
  max_mask_area_ratio: 0.30
  min_mask_area_px:    16
  text_prompts: ["crack"]
  ensemble_prompts: ["crack", "road crack", "thin crack", "fissure"]
  enable_hflip_tta: false
  autocast_dtype: bfloat16
  mc_samples: 1
  device: cuda

student:
  name: scsegamba_lite           # ← legacy BiSSM-Lite, 2.43M (same as A/B/C/D)
  in_channels: 3
  base_channels: 32
  num_classes: 1
  edge_branch: true

gate:
  alpha: 1.0
  beta:  1.0
  gamma: 1.0
  sigma_s: 5.0
  tau: 0.5

# ★ Ablation E: A + EMA Consistency  (NO topology terms at all)
loss:
  w_dice:         1.0
  w_bce:          1.0
  w_skelrecall:   0.0       # — off  (proven harmful at 30ep, ablation C)
  w_cldice:       0.0       # — off  (proven marginal, ablation B)
  w_dt:           0.0       # — off
  w_edge:         0.0       # — off
  w_consistency:  0.1       # ★ the only addition vs A

train:
  epochs:         40        # same length as A/B/C/D for fair comparison
  batch_size:     4
  grad_accum_steps: 2
  optimizer:      adamw
  lr:             2.0e-4
  weight_decay:   1.0e-4
  scheduler:      cosine
  warmup_epochs:  3
  ema_decay:      0.999
  amp:            true
  log_every:      50
  ckpt_every:     10
  resume:         null
