
# TopoSAM-Crack on CrackSeg (Ultralytics, 3717/112/200)
# 注意：Crack-seg 比 CRACK500 噪音多（墙面 + 颗粒纹理），SAM3 过滤要更严

experiment:
  name: toposam_crackseg
  seed: 42
  output_dir: outputs/toposam_crackseg

data:
  root: ./data
  train_manifest: manifests/CrackSeg.json
  val_manifest:   manifests/CrackSeg.json
  pseudo_cache:   outputs/pseudo/CrackSeg
  image_size: 512
  num_workers: 6
  # ★ 加严过滤
  min_pseudo_ratio: 0.001
  max_pseudo_ratio: 0.15

crossdomain:
  - {name: CRACK500,  manifest: manifests/CRACK500.json,  split: test}
  - {name: DeepCrack, manifest: manifests/DeepCrack.json, split: test}
  - {name: CFD,       manifest: manifests/CFD.json,       split: test}

teacher:
  name: sam3
  ckpt: ./checkpoints/sam3/sam3.pt
  load_from_HF: false
  bpe_path: null
  resolution: 1008

  # ★ 比 CRACK500 严：去散点 + 限大块
  confidence_threshold: 0.30
  binary_threshold:     0.4
  score_weight:         true
  max_mask_area_ratio:  0.25
  min_mask_area_px:     100         # ★ 关键：散点直接干掉

  text_prompts: ["crack"]
  ensemble_prompts: ["crack", "a crack", "thin crack on surface", "fissure"]
  enable_hflip_tta: false
  autocast_dtype: bfloat16
  mc_samples: 1
  device: cuda

student:
  name: scsegamba_lite
  in_channels: 3
  base_channels: 32
  num_classes: 1
  edge_branch: true

gate:
  alpha: 1.0
  beta: 1.0
  gamma: 1.0
  sigma_s: 5.0
  tau: 0.5

loss:
  w_dice: 1.0
  w_bce: 1.0
  w_skelrecall: 0.5
  w_cldice: 0.5
  w_dt: 0.2
  w_edge: 0.3
  w_consistency: 0.1

train:
  epochs: 50
  batch_size: 4
  grad_accum_steps: 2
  optimizer: adamw
  lr: 2.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 3
  ema_decay: 0.999
  amp: true
  log_every: 50
  ckpt_every: 10
  resume: null
